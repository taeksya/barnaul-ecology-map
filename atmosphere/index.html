        function createBeautifulPopup(feature, layerName) {
            var popupContent = '<div class="custom-popup-content">';
            var popupTitle = 'Информация об объекте';
            
            if (layerName.includes('layer__24')) popupTitle = 'Промышленный объект';
            else if (layerName.includes('layer__25')) popupTitle = 'Международный аэропорт';
            else if (layerName.includes('layer__26')) popupTitle = 'Энергетика';
            else if (layerName.includes('layer__27')) popupTitle = 'Химическая промышленность';
            else if (layerName.includes('layer__28')) popupTitle = 'Фармацевтика';
            else if (layerName.includes('layer__29')) popupTitle = 'Сбор отходов';
            else if (layerName.includes('layer__30')) popupTitle = 'Стройматериалы';
            else if (layerName.includes('layer__31')) popupTitle = 'Деревообработка';
            else if (layerName.includes('layer__32')) popupTitle = 'Пищевая промышленность';
            else if (layerName.includes('layer__33')) popupTitle = 'Нефтехранилище';
            else if (layerName.includes('layer__34')) popupTitle = 'Машиностроение';
            else if (layerName.includes('layer__35')) popupTitle = 'Легкая промышленность';
            else if (layerName.includes('layer__36')) popupTitle = 'Добывающая промышленность';
            else if (layerName.includes('layer__37')) popupTitle = 'Водоснабжение';
            else if (layerName.includes('layer__38')) popupTitle = 'Граница района города';
            else if (layerName.includes('layer__39')) popupTitle = 'Граница городского округа';
            else if (layerName.includes('layer__12')) popupTitle = 'Земли населенных пунктов';
            else if (layerName.includes('layer__11')) popupTitle = 'Парки,скверы';
            else if (layerName.includes('layer__0')) popupTitle = 'Земли лесного фонда';
            else if (layerName.includes('layer__2') || layerName.includes('layer__3') || layerName.includes('layer__4')) popupTitle = 'Рельеф';
            else if (layerName.includes('layer__5')) popupTitle = 'Особо охраняемые природные территории';
            else if (layerName.includes('layer__6') || layerName.includes('layer__7') || layerName.includes('layer__8') || layerName.includes('layer__9') || layerName.includes('layer__10')) popupTitle = 'Гидрография';
            else if (layerName.includes('layer__13')) popupTitle = 'Санитарный разрыв';
            else if (layerName.includes('layer__14')) popupTitle = 'Санитарно-защитная зона';
            else if (layerName.includes('layer__15')) popupTitle = 'Железные дороги';
            else if (layerName.includes('layer__16') || layerName.includes('layer__17') || layerName.includes('layer__18') || layerName.includes('layer__19')) popupTitle = 'Автомобильные дороги';
            else if (layerName.includes('layer__1')) popupTitle = 'Земли сельскохозяйственного назначения';

            popupContent += '<div class="popup-header">' + popupTitle + '</div>';
            
            var hasData = false;
            for (var key in feature.properties) {
                if (key === 'landuse') continue;
                if (feature.properties[key] !== null && feature.properties[key] !== undefined && 
                    feature.properties[key] !== '' && feature.properties[key] !== 'NULL') {
                    hasData = true;
                    break;
                }
            }
            
            if (!hasData) {
                popupContent += '<div class="attribute-group"><div class="attribute-value" style="text-align:center;">Нет дополнительных данных</div></div>';
            } else {
                for (var key in feature.properties) {
                    if (key === 'landuse') continue;
                    if (feature.properties[key] !== null && feature.properties[key] !== undefined && 
                        feature.properties[key] !== '' && feature.properties[key] !== 'NULL') {
                        var value = feature.properties[key];
                        var displayName = key;
                        var formattedValue = (typeof value === 'number') ? Number(value).toFixed(2) : String(value);
                        popupContent += '<div class="attribute-group">';
                        popupContent += '<div class="attribute-title">' + displayName + '</div>';
                        popupContent += '<div class="attribute-value">' + (autolinker ? autolinker.link(formattedValue) : formattedValue) + '</div>';
                        popupContent += '</div>';
                    }
                }
            }
            popupContent += '</div>';
            return popupContent;
        }
        
        function highlightFeature(e) {
            highlightLayer = e.target;
            if (fixedPopup) { map.closePopup(fixedPopup); fixedPopup = null; }
            highlightLayer.openPopup();
        }
        
        function bindPopupEvents(layer, feature, layerId) {
            var popupContent = createBeautifulPopup(feature, layerId);
            var popup = L.popup({ maxHeight: 400, className: 'custom-popup', autoPan: true, closeOnClick: false, autoClose: false }).setContent(popupContent);
            layer.bindPopup(popup);
            layer.on({
                mouseout: function(e) { if (!layer._popup || !layer._popup._fixed) { if (typeof layer.closePopup == 'function') layer.closePopup(); } },
                mouseover: highlightFeature,
                click: function(e) {
                    if (layer._popup) {
                        layer._popup._fixed = true;
                        layer._popup._wrapper.classList.add('leaflet-popup-fixed');
                        fixedPopup = layer._popup;
                        var closeBtn = layer._popup._container.querySelector('.leaflet-popup-close-button');
                        if (closeBtn) closeBtn.title = 'Закрепить попап (Esc)';
                    }
                }
            });
            layer.on('popupclose', function(e) {
                if (e.popup === fixedPopup) fixedPopup = null;
                if (e.popup._wrapper) { e.popup._wrapper.classList.remove('leaflet-popup-fixed'); e.popup._fixed = false; }
            });
        }
